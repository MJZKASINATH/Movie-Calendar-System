<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="styleforadmin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="admin-container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="admin-logo">
            <i class="fa-solid fa-film"></i>
            <h2>MovieHub</h2>
        </div>

        <ul>

            <li class="active">
                <i class="fa-solid fa-chart-line"></i>
                Dashboard
            </li>

            <li>
                <i class="fa-solid fa-clapperboard"></i>
                <a href="index.html">Movies</a>
            </li>

            <li>
                <i class="fa-solid fa-calendar"></i>
                <a href="UpMovie.html">Upcoming</a>
            </li>

            <li>
                <i class="fa-solid fa-star"></i>
                <a href="MovieHub(UID).html">Released</a>
            </li>

            <li>
                <i class="fa-solid fa-users"></i>
                <a href="about.html">Users</a>
            </li>

        </ul>

    </aside>

    <!-- MAIN CONTENT -->

    <main class="dashboard">

        <!-- TOPBAR -->

        <div class="topbar">

            <h1>Admin Dashboard</h1>

        </div>

        <!-- STATS -->

        <div class="stats">

            <div class="card">

                <div class="card-icon blue-bg">
                    <i class="fa-solid fa-film"></i>
                </div>

                <div>
                    <h2>40</h2>
                    <p>Total Movies</p>
                </div>

            </div>

            <div class="card">

                <div class="card-icon red-bg">
                    <i class="fa-solid fa-calendar"></i>
                </div>

                <div>
                    <h2>12</h2>
                    <p>Upcoming</p>
                </div>

            </div>

            <div class="card">

                <div class="card-icon gold-bg">
                    <i class="fa-solid fa-star"></i>
                </div>

                <div>
                    <h2>28</h2>
                    <p>Released</p>
                </div>

            </div>

            <div class="card">

                <div class="card-icon green-bg">
                    <i class="fa-solid fa-users"></i>
                </div>

                <div>
                    <h2>1.2K</h2>
                    <p>Users</p>
                </div>

            </div>

        </div>

    </main>

</div>

</body>
</html>
