<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    body{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin-top: 25%;
    }
    h1,h2{
        color: white;
    }
    .login-container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color: white;
    background-color: #111;
    }

    .login-box{
    width:350px;
    background:#111;
    padding:30px;
    border-radius:10px;
    }


    .login-box input{
    width:100%;
    padding:15px;
    margin:10px 0;
    background:#222;
    border:none;
    }

    .login-box button{
    width:100%;
    padding:15px;
    background:#204cff;
    border:none;
    color:white;
    margin-top:10px;
    }
</style>
</head>
<body bgcolor="black">
    <h1>Moviehub</h1>
        <div class="login-box">
            <h2>Admin Login</h2>
                <form>
                  <input type="email" placeholder="Email">
                  <input type="password" placeholder="Password">
                  <button onclick="window.location.href='admin.html'">LOGIN</button>
                </form>
        </div>
</body>
</html>
